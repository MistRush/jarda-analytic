<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JARDA Analytic – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script>google.charts.load('current', { 'packages': ['geochart'] });</script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --surface2: #ffffff;
      --text: #202124;
      --text2: #5f6368;
      --text3: #80868b;
      --border: #dadce0;
      --accent: #1a73e8;
      --accent-hover: #174ea6;
      --shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family: 'Roboto', sans-serif; background:var(--bg); color:var(--text); line-height:1.5; padding-bottom: 50px;}
    
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.05); }
    .logo { font-size:1.2rem; font-weight:500; color:var(--text); white-space:nowrap; }
    .logo span { color:var(--accent); font-weight:700;}
    .search-row{display:flex;gap:10px;flex:1;min-width:260px}
    .search-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s}
    .search-row input:focus{border-color:var(--accent)}
    .search-row input::placeholder{color:var(--text3)}
    .preset-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:.85rem;outline:none;cursor:pointer}
    .preset-select:focus{border-color:var(--accent)}
    .date-tabs{display:flex;gap:2px;background:var(--surface);padding:4px;border-radius:8px;border:1px solid var(--border);align-items:center;}
    .date-tab{background:transparent;border:none;padding:6px 12px;font-size:.85rem;color:var(--text2);cursor:pointer;border-radius:6px;font-weight:500;transition:all .2s;}
    .date-tab.active{background:#e8f0fe;color:#1a73e8;}
    .date-tab:hover:not(.active){background:var(--bg);color:var(--text);}
    .btn-load{padding:10px 22px;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;border:none;border-radius:8px;font-family:inherit;font-weight:700;font-size:.9rem;cursor:pointer;transition:opacity .2s}
    .btn-load:hover{opacity:.85}
    /* ── MAIN ── */
    main{flex:1;padding:32px;display:flex;flex-direction:column;gap:24px}
    /* ── CARDS ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:4px; transition:box-shadow .2s;}
    .kpi:hover{box-shadow:var(--shadow);}
    .kpi-val{font-size:1.75rem;font-weight:400;color:var(--text);line-height:1.2}
    .kpi-lbl{font-size:.85rem;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.02em}
    .kpi-trend{font-size:0.75rem; font-weight:500; margin-top:2px;}
    .kpi-trend.up{color:#137333;}
    .kpi-trend.down{color:#c5221f;}
    /* ── CHARTS ROW ── */
    .charts-row{display:grid;grid-template-columns:2.5fr 1fr;gap:24px;margin-bottom:24px}
    .tables-row{display:grid;grid-template-columns:1fr;gap:24px;margin-bottom:24px}
    @media(max-width:1100px){.charts-row,.tables-row{grid-template-columns:1fr}}
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .2s;}
    .chart-card:hover{box-shadow:var(--shadow);}
    .card-head{padding:16px 20px;border-bottom:1px solid var(--border);font-size:1rem;font-weight:500;color:var(--text)}
    .card-body{padding:20px;flex:1;position:relative;overflow-x:auto;}
    canvas{max-height:220px}
    /* ── TABLES ROW ── */
    table{width:100%;border-collapse:collapse;text-align:left;font-size:.85rem}
    th{padding:12px 16px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:500;white-space:nowrap; border-right:1px solid var(--border);}
    th:last-child{border-right:none;}
    td{padding:12px 16px;border-bottom:1px solid var(--border);color:var(--text); white-space:nowrap; border-right:1px solid var(--border);}
    td:last-child{border-right:none;}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(26,115,232,0.04)}
    .bar-bg{background:#e8eaed;height:4px;border-radius:2px;margin-top:6px;overflow:hidden;width:100%;}
    .bar-fg{background:var(--accent);height:100%;border-radius:2px;}
    .metric-col{text-align:right;}
    th.metric-col{text-align:right;}
    /* ── LOADER / EMPTY ── */
    #state{text-align:center;padding:80px 20px;color:var(--text3)}
    .spinner{width:40px;height:40px;border:3px solid rgba(26,115,232,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #dashboard{display:none}
    /* ── SECURITY NOTE ── */
    .sec-note{background:rgba(26,115,232,0.1);border:1px solid rgba(26,115,232,0.3);color:#174ea6;padding:16px;border-radius:8px;font-size:.9rem;display:flex;align-items:flex-start;gap:12px;margin-top:24px}
  </style>
</head>
<body>

<header>
  <div style="display:flex; flex-direction:column; justify-content:center;">
    <div class="logo">JARDA <span>Analytic</span></div>
    <div style="font-size:0.6rem; color:var(--text3); font-weight:600; letter-spacing:0.06em; text-transform:uppercase; margin-top:2px;">Just Another Rapid Development Architecture</div>
  </div>
  <div class="search-row">
    <input id="propInput" type="text" placeholder="GA4 Property ID" autocomplete="off" style="max-width:140px; padding:8px 12px;"/>
    
    <div class="date-tabs" id="dateTabs">
      <button class="date-tab" data-val="today">Dnes</button>
      <button class="date-tab" data-val="this_week">Týden</button>
      <button class="date-tab active" data-val="this_month">Měsíc</button>
      <button class="date-tab" data-val="last_month">Minulý měsíc</button>
      <button class="date-tab" data-val="this_year">Rok</button>
      <button class="date-tab" data-val="custom">Vlastní</button>
    </div>

    <div class="date-picker" id="customDates" style="display:flex; align-items:center; gap:5px; display:none;">
      <input type="date" id="startDate" title="Od data" class="preset-select">
      <span style="color:var(--text3)">-</span>
      <input type="date" id="endDate" title="Do data" class="preset-select">
    </div>
  </div>
</header>

<main>
  <div id="state">
    <div class="spinner" id="spinner" style="display:none"></div>
    <p id="stateMsg" style="font-size:1rem;color:var(--text2)">Zadej GA4 Property ID pro načtení dat</p>
  </div>

  <div id="dashboard">
    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="card-head">Denní trend</div>
        <div class="card-body"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="card-head">Zařízení</div>
        <div class="card-body"><canvas id="deviceChart"></canvas></div>
      </div>
    </div>

    <div class="tables-row">
      <div class="chart-card">
        <div class="card-head">Akvizice návštěvnosti (Zdroje)</div>
        <div class="card-body" id="sourcesTable" style="overflow-x:auto;"></div>
      </div>
    </div>

    <div class="tables-row" style="grid-template-columns: 1fr 1fr;">
      <div class="chart-card">
        <div class="card-head">TOP stránky</div>
        <div class="card-body" id="pagesTable" style="overflow-x:auto;"></div>
      </div>
      <div class="chart-card">
        <div class="card-head">Geografie</div>
        <div class="card-body" id="geoTable" style="overflow-x:auto;"></div>
      </div>
    </div>
  </div>
</main>

<script>
let trendChart = null;
let deviceChart = null;

const dateInputStart = document.getElementById('startDate');
const dateInputEnd = document.getElementById('endDate');
const customDates = document.getElementById('customDates');
const dateTabs = document.querySelectorAll('.date-tab');

const urlParams = new URLSearchParams(window.location.search);
const urlPropertyId = urlParams.get('propertyId');
if (urlPropertyId) {
  document.getElementById('propInput').value = urlPropertyId;
}

function handlePresetChange(val) {
  if (val === 'custom') {
    customDates.style.display = 'flex';
    return;
  } else {
    customDates.style.display = 'none';
  }

  const today = new Date();
  let start = new Date(today);
  let end = new Date(today);

  switch(val) {
    case 'today': break;
    case 'this_week':
      const day = start.getDay();
      const diff = start.getDate() - day + (day === 0 ? -6 : 1);
      start.setDate(diff);
      break;
    case 'this_month': start.setDate(1); break;
    case 'last_month':
      start.setMonth(start.getMonth() - 1);
      start.setDate(1);
      end = new Date(start.getFullYear(), start.getMonth() + 1, 0);
      break;
    case 'this_year': start.setMonth(0); start.setDate(1); break;
  }
  
  const format = d => {
    const tzOffset = d.getTimezoneOffset() * 60000;
    return new Date(d.getTime() - tzOffset).toISOString().split('T')[0];
  };

  dateInputStart.value = format(start);
  dateInputEnd.value = format(end);
  
  if (document.getElementById('propInput').value.trim() !== '') {
    loadData();
  }
}

dateTabs.forEach(tab => {
  tab.addEventListener('click', (e) => {
    dateTabs.forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    handlePresetChange(e.target.dataset.val);
  });
});

handlePresetChange('this_month');

dateInputStart.addEventListener('change', loadData);
dateInputEnd.addEventListener('change', loadData);

document.getElementById('propInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadData();
});

async function loadData() {
  const propertyId = document.getElementById('propInput').value.trim();
  if (!propertyId) return;
  const start = dateInputStart.value;
  const end = dateInputEnd.value;
  const state = document.getElementById('state');
  const dash = document.getElementById('dashboard');
  const spinner = document.getElementById('spinner');
  const msg = document.getElementById('stateMsg');

  spinner.style.display = 'block';
  msg.innerText = 'Načítám data z Google Analytics...';
  state.style.display = 'block';
  dash.style.display = 'none';

  try {
    const res = await fetch(`/api/analytics?propertyId=${encodeURIComponent(propertyId)}&startDate=${start}&endDate=${end}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Chyba API');
    render(data);
    state.style.display = 'none';
    dash.style.display = 'block';
  } catch (err) {
    spinner.style.display = 'none';
    msg.innerHTML = `<span style="color:#ef4444">${err.message}</span>`;
  }
}

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'k';
  return n.toLocaleString('cs-CZ');
}

function render(d) {
  const calcTrend = (cur, prev) => {
    if(!prev || prev == 0) return { text: '', cls: '' };
    const perc = ((cur - prev) / prev) * 100;
    const sign = perc > 0 ? '↑' : '↓';
    return { 
      text: `${sign} ${Math.abs(perc).toFixed(1)} %`, 
      cls: perc > 0 ? 'up' : 'down' 
    };
  };

  const o = d.overview;
  const p = d.prevOverview;
  
  const kpis = [
    { val: d.realtime.activeUsers, lbl:'Aktivní uživatelé', cur:d.realtime.activeUsers, prev:0 },
    { val: fmt(o.totalUsers),      lbl:'Uživatelé',         cur:o.totalUsers, prev:p.totalUsers },
    { val: fmt(o.sessions),        lbl:'Návštěvy',          cur:o.sessions, prev:p.sessions },
    { val: fmt(o.pageViews),       lbl:'Zobrazení stránek', cur:o.pageViews, prev:p.pageViews },
    { val: o.bounceRate+'%',       lbl:'Míra opuštění',     cur:parseFloat(o.bounceRate), prev:parseFloat(p.bounceRate) },
    { val: o.avgSessionDuration,   lbl:'Průměrná doba',     cur:0, prev:0 }, // Trend calculation for duration is complex without raw seconds
    { val: o.purchases,            lbl:'Nákupy',            cur:o.purchases, prev:p.purchases },
    { val: o.revenue + ' Kč',      lbl:'Tržby',             cur:o.revenue, prev:p.revenue },
  ];

  document.getElementById('kpiGrid').innerHTML = kpis.map(k => {
    if(k.lbl === 'Aktivní uživatelé') {
      return `
      <div class="kpi" style="padding-bottom:8px;">
        <div class="kpi-lbl">${k.lbl} (30 min)</div>
        <div class="kpi-val">${k.val}</div>
        <div style="height:40px; margin-top:auto; width:100%; position:relative;">
          <canvas id="rtChart"></canvas>
        </div>
      </div>`;
    }

    const t = calcTrend(k.cur, k.prev);
    if(k.lbl === 'Míra opuštění') {
      t.cls = t.cls === 'up' ? 'down' : (t.cls === 'down' ? 'up' : '');
    }
    return `
    <div class="kpi">
      <div class="kpi-lbl">${k.lbl}</div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-trend ${t.cls}">${t.text}</div>
    </div>`;
  }).join('');

  // 🔴 Realtime Chart
  const ctxRt = document.getElementById('rtChart');
  if(ctxRt && window.rtChartInst) window.rtChartInst.destroy();
  if(ctxRt) {
    window.rtChartInst = new Chart(ctxRt.getContext('2d'), {
      type: 'bar',
      data: {
        labels: Array.from({length:30}, (_,i) => `Před ${30-i} min`),
        datasets: [{
          data: d.realtime.trend,
          backgroundColor: '#1a73e8',
          borderWidth: 0,
          borderRadius: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: { display: false },
          y: { display: false, beginAtZero: true }
        },
        layout: { padding: 0 }
      }
    });
  }

  const ctxTrend = document.getElementById('trendChart').getContext('2d');
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctxTrend, {
    type: 'line',
    data: {
      labels: d.trend.labels,
      datasets: [
        {
          label: 'Aktuální období',
          data: d.trend.current,
          borderColor: '#1a73e8',
          backgroundColor: 'rgba(26,115,232,0.1)',
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: '#1a73e8',
          fill: true,
          tension: 0.3
        },
        {
          label: 'Předchozí období',
          data: d.trend.previous,
          borderColor: '#aecbfa',
          borderDash: [5, 5],
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 4,
          fill: false,
          tension: 0.3
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, position: 'bottom', labels: { boxWidth: 12, usePointStyle: true } },
        tooltip: {
          backgroundColor: '#ffffff',
          titleColor: '#202124',
          bodyColor: '#5f6368',
          borderColor: '#dadce0',
          borderWidth: 1,
          padding: 12,
          usePointStyle: true,
          callbacks: {
            title: function(context) { return context[0].label; },
            label: function(context) {
              let label = context.dataset.label + ': ';
              return label + fmt(context.parsed.y);
            },
            afterBody: function(context) {
              if(context.length > 1) {
                const cur = context[0].parsed.y;
                const prev = context[1].parsed.y;
                if(prev > 0) {
                  const perc = ((cur - prev) / prev) * 100;
                  const sign = perc > 0 ? '↑' : '↓';
                  return `\nZměna: ${sign} ${Math.abs(perc).toFixed(1)}%`;
                }
              }
              return '';
            }
          }
        }
      },
      scales: {
        y: { beginAtZero: true, grid: { color: '#f1f3f4' }, border: { dash: [4, 4] } },
        x: { grid: { display: false } }
      }
    }
  });

  // 📱 Zařízení (Donut)
  const ctxDev = document.getElementById('deviceChart').getContext('2d');
  if (deviceChart) deviceChart.destroy();
  deviceChart = new Chart(ctxDev, {
    type: 'doughnut',
    data: {
      labels: d.devices.map(x => x.device),
      datasets: [{
        data: d.devices.map(x => x.sessions),
        backgroundColor: ['#1a73e8', '#34a853', '#fbbc04', '#ea4335'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, usePointStyle: true } }
      },
      cutout: '70%'
    }
  });

  // 🔗 Zdroje návštěvnosti (Akvizice)
  const maxSessions = Math.max(...d.sources.map(s => s.sessions), 1);
  document.getElementById('sourcesTable').innerHTML = `
    <table style="min-width: 800px;">
      <thead>
        <tr>
          <th>Seskupení kanálů</th>
          <th class="metric-col">Návštěvy</th>
          <th class="metric-col">Relace se zapojením</th>
          <th class="metric-col">Míra zapojení</th>
          <th class="metric-col">Prům. doba</th>
          <th class="metric-col">Konverze</th>
        </tr>
      </thead>
      <tbody>${d.sources.map(s => {
        const pct = (s.sessions / maxSessions) * 100;
        return `
        <tr>
          <td title="${s.channel}" style="font-weight:500; color:#1a73e8;">${s.channel}</td>
          <td class="metric-col">
            ${fmt(s.sessions)}
            <div class="bar-bg"><div class="bar-fg" style="width:${pct}%"></div></div>
          </td>
          <td class="metric-col">${fmt(s.engagedSessions)}</td>
          <td class="metric-col">${s.engagementRate}%</td>
          <td class="metric-col">${Math.floor(s.avgDuration / 60)}m ${s.avgDuration % 60}s</td>
          <td class="metric-col">${fmt(s.conversions)}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;

  // Pages table — klikatelné odkazy
  document.getElementById('pagesTable').innerHTML = `
    <table style="min-width:350px;">
      <thead><tr><th>Stránka</th><th class="metric-col">Zobrazení</th></tr></thead>
      <tbody>${d.topPages.map(p => `
        <tr>
          <td style="max-width:260px; overflow:hidden; text-overflow:ellipsis;" title="${p.path}">
            <a href="https://${p.host}${p.path}" target="_blank" rel="noopener" style="color:#1a73e8; text-decoration:none; font-weight:500;">${p.path}</a>
          </td>
          <td class="metric-col">${fmt(p.views)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;

  // GeoChart Mapa
  document.getElementById('geoTable').innerHTML = `
    <div id="geo_chart_div" style="width:100%; min-height:240px;"></div>
    <table style="min-width:350px; margin-top:12px;">
      <thead><tr><th>Město</th><th>Stát</th><th class="metric-col">Relace</th></tr></thead>
      <tbody>${d.geo.filter(g => g.city !== '(not set)').map(g => `
        <tr>
          <td style="font-weight:500;">${g.city}</td>
          <td style="color:#5f6368;">${g.country}</td>
          <td class="metric-col">${fmt(g.sessions)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;

  // GeoChart Mapa - Leaflet OpenStreetMap (bez API klíče)
  const geoContainer = document.getElementById('geoTable');
  geoContainer.innerHTML = `
    <div id="leaflet_map" style="width:100%; height:240px; border-radius:6px; overflow:hidden;"></div>
    <table style="min-width:350px; margin-top:12px;">
      <thead><tr><th>Město</th><th>Stát</th><th class="metric-col">Relace</th></tr></thead>
      <tbody>${d.geo.filter(g => g.city !== '(not set)').map(g => `
        <tr>
          <td style="font-weight:500;">${g.city}</td>
          <td style="color:#5f6368;">${g.country}</td>
          <td class="metric-col">${fmt(g.sessions)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;

  // Coords lookup pro česká města
  const cityCoords = {
    'Prague': [50.0755, 14.4378], 'Brno': [49.1951, 16.6068],
    'Ostrava': [49.8209, 18.2625], 'Plzeň': [49.7384, 13.3736],
    'Liberec': [50.7663, 15.0543], 'Olomouc': [49.5938, 17.2509],
    'České Budějovice': [48.9747, 14.4747], 'Hradec Králové': [50.2092, 15.8328],
    'Pardubice': [50.0343, 15.7812], 'Kladno': [50.1478, 14.1027],
    'Havirov': [49.7797, 18.4305], 'Opava': [49.9381, 17.9026],
    'Zlín': [49.2265, 17.6674], 'Jihlava': [49.3961, 15.5911],
    'Karlovy Vary': [50.2322, 12.8714], 'Bratislava': [48.1486, 17.1077],
    'Warsaw': [52.2298, 21.0118], 'Vienna': [48.2082, 16.3738],
    'Kraków': [50.0647, 19.9450], 'Budapest': [47.4979, 19.0402],
    'Cologne': [50.9333, 6.9500]
  };

  // Dynamicky načíst Leaflet jen jednou
  if (!window.L) {
    const leafletCSS = document.createElement('link');
    leafletCSS.rel = 'stylesheet';
    leafletCSS.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(leafletCSS);

    const leafletJS = document.createElement('script');
    leafletJS.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    leafletJS.onload = () => renderLeafletMap(d.geo);
    document.head.appendChild(leafletJS);
  } else {
    renderLeafletMap(d.geo);
  }
}

function renderLeafletMap(geoData) {
  const cityCoords = {
    'Prague': [50.0755, 14.4378], 'Brno': [49.1951, 16.6068],
    'Ostrava': [49.8209, 18.2625], 'Plzeň': [49.7384, 13.3736],
    'Liberec': [50.7663, 15.0543], 'Olomouc': [49.5938, 17.2509],
    'České Budějovice': [48.9747, 14.4747], 'Hradec Králové': [50.2092, 15.8328],
    'Pardubice': [50.0343, 15.7812], 'Kladno': [50.1478, 14.1027],
    'Havirov': [49.7797, 18.4305], 'Opava': [49.9381, 17.9026],
    'Bratislava': [48.1486, 17.1077], 'Warsaw': [52.2298, 21.0118],
    'Vienna': [48.2082, 16.3738], 'Karlovy Vary': [50.2322, 12.8714],
    'Zlín': [49.2265, 17.6674], 'Jihlava': [49.3961, 15.5911],
  };

  const mapDiv = document.getElementById('leaflet_map');
  if (!mapDiv) return;
  if (window._leafletMap) { window._leafletMap.remove(); }

  const map = L.map('leaflet_map', { zoomControl: true, scrollWheelZoom: false });
  window._leafletMap = map;

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  const maxSess = Math.max(...geoData.map(g => g.sessions), 1);
  let bounds = [];

  geoData.filter(g => g.city !== '(not set)' && cityCoords[g.city]).forEach(g => {
    const coords = cityCoords[g.city];
    const radius = 8 + (g.sessions / maxSess) * 20;
    const circle = L.circleMarker(coords, {
      radius,
      fillColor: '#1a73e8',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.75
    }).addTo(map);
    circle.bindPopup(`<b>${g.city}</b><br>${g.sessions} relací`);
    bounds.push(coords);
  });

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [20, 20] });
  } else {
    map.setView([49.8, 15.5], 7);
  }
}
</script>
