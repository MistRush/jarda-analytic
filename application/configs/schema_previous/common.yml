    Active:
      type: boolean
    CronExpression:
      type: string(128)
    Minute:
      type: string(16)
    Hour:
      type: string(16)
    Day:
      type: string(16)
    Month:
      type: string(16)
    Week:
      type: string(16)
    Script:
      type: string(64)
    Note:
      type: string(1024)
