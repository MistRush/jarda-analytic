      type: integer
  relations:
    cron:
      class: Common_Model_Cron
      foreignAlias: cronUsers
      local: Cron_ID
      foreign: ID
    user:
      class: User_Model_User
      foreignAlias: cronUsers
      local: User_ID
      foreign: ID
